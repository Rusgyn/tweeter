<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta Information -->
    <title>Tweeter - Home Page</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" type="text/css" />

    <!-- External fonts from Google -->
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <!-- External fonts from cdnjs, (font awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- App CSS -->
    <link rel="stylesheet" href="/styles/layout.css" type="text/css" />
    <link rel="stylesheet" href="/styles/nav.css" type="text/css" />
    <link rel="stylesheet" href="/styles/header.css" type="text/css" />
    <link rel="stylesheet" href="/styles/new-tweet.css" type="text/css" />
    <link rel="stylesheet" href="/styles/tweet.css" type="text/css" />
    <!-- External JS -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

    <!-- App JS -->
    <script type="text/javascript" src="/scripts/client.js"></script>
    <script type="text/javascript" src="/scripts/composer-char-counter.js"></script>

  </head>

  <body>
    <!-- Top nav bar (fixed) -->
    <nav>
      <span class="logo" style="font-family: Bungee, sans-serif">tweeter</span>
      <div class="write-new-tweet">
        <p><b>Write </b> a new tweet <br>
        <i class="tab fa-solid fa-angles-down"></i></p>
      </div>
    </nav>
    <!-- Avatar and user's full name -->
    <header class="profile-header">
      <div class="profile-user-image">
          <img src="/images/profile-hex.png"> 
      </div>
      <div class="profile-user-name">
          <h2>Amy Mansell</h2>
      </div>
    </header>

    <!-- Page-specific (main) content here -->
    <main class="container">
      <section class="new-tweet">
        <h2>Compose Tweet</h2>
        <form id="tweet-form" action="/tweets" method="POST">
          <label for="tweet-text">What are you humming about?</label>
          <textarea type="text" name="text" required id="tweet-textarea" rows="1"></textarea>
          <!-- tweet submit button and character counter -->
          <div class="tweet-btn-and-counter">
            <button class="tweet-btn" type="submit">Tweet</button>
            <output name="counter" class="counter" for="tweet-text">140</output>
          </div>
        </form>
      </section> 

      <!-- Tweet container -->
      <article class="tweets-container">
        <!-- User info -->
        <header class="tweets-container-header">
          <img class="tweeter-user-icon" src="/images/userf-icon.png"> Amy Mansell
          <div class="tweeter-userName">@userd</div>
        </header>
        <!-- displaying user tweets -->
        <section>
          <input type="text" name="text" rows="1" class="tweet-textarea-container" >
        </section>
        <!-- tweets time info -->
        <footer class="tweets-container-footer">
          <div class="footer-left">
            10 days ago
          </div>
          <div class="footer-right">
            <i class="fa-solid fa-flag"></i>
            <i class="fa-solid fa-retweet"></i>
            <i class="fa-solid fa-heart"></i>
          </div>
        </footer>
      </article> 

    </main>
  </body>
</html>
